name: CI — Lint, Test, Build

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  # ── SERVICE: Lint + Format + Test with Coverage ──────────────────
  service-quality:
    name: Service — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: service/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format . --check

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml -v

      - name: Upload service coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-coverage
          path: service/coverage.xml

  # ── PIPELINE: Lint + Format + Test with Coverage ─────────────────
  pipeline-quality:
    name: Pipeline — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format . --check

      - name: Run tests with coverage
        run: pytest --cov=ingestion --cov-report=term-missing --cov-report=xml:coverage.xml -v

      - name: Upload pipeline coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-coverage
          path: pipeline/coverage.xml

  # ── DOCKER: Build all images ─────────────────────────────────────
  docker-build:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [service-quality, pipeline-quality]

    steps:
      - uses: actions/checkout@v4

      - name: Build all Docker images
        run: docker compose build

      - name: Verify images created
        run: docker images --filter "reference=movie-rec-app*" --format "{{.Repository}}:{{.Tag}} ({{.Size}})"
