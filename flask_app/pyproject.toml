[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["migrations", "__pycache__", ".venv"]
indent-width = 2

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
pythonpath = ["src"]
addopts = "--cov=src --cov-report=term-missing --cov-report=html"
