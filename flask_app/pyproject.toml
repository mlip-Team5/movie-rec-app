[tool.ruff]
line-length = 100
target-version = "py311"
exclude = ["migrations", "__pycache__", ".venv"]
indent-width = 2

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # import sorting
    "B",   # bugbear (very useful)
    "UP"   # python upgrades
]

ignore = [
    "E501"  # ignore long lines if you want flexibility
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
pythonpath = ["src"]
