version: "3.8"

services:
  recommendation-service:
    build:
      context: ./flask_app
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - MODEL_PATH=/app/models/model.pkl
    volumes:
      - model-data:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  model-data:
